<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dots & Boxes 🎮</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}
h1{font-size:24px;font-weight:700;margin-bottom:2px;letter-spacing:1px}
.sub{font-size:12px;color:#666;margin-bottom:18px}
.card{background:#1a1a2e;border-radius:16px;padding:20px;margin-bottom:14px;border:1px solid #2a2a45;width:100%;max-width:360px}
.card h2{font-size:15px;color:#aaa;margin-bottom:12px;font-weight:600}
input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #333;background:#0f0f1a;color:#fff;font-size:15px;margin-bottom:10px;outline:none}
input:focus{border-color:#4f8ef7}
.btn{width:100%;padding:12px;border-radius:10px;border:none;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.blue{background:#4f8ef7;color:#fff}
.red{background:#e24b4a;color:#fff}
.green{background:#22c55e;color:#fff}
.gray{background:#2a2a45;color:#ccc;border:1px solid #333}
.or{text-align:center;color:#444;margin:8px 0;font-size:13px}
.link-box{background:#0f0f1a;border:1px dashed #4f8ef7;border-radius:10px;padding:12px;text-align:center;margin:10px 0;word-break:break-all;font-size:13px;color:#4f8ef7;cursor:pointer}
.link-box:hover{background:#111130}
.status{text-align:center;font-size:13px;color:#f59e0b;min-height:20px;margin:6px 0}
.waiting{animation:pulse 1.5s infinite;color:#888;font-size:13px;text-align:center;margin-top:8px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#game{display:none;width:100%;max-width:420px}
.scores{display:flex;gap:10px;margin-bottom:12px}
.sc{flex:1;background:#1a1a2e;border-radius:12px;padding:10px;border:2px solid transparent;text-align:center;transition:border-color .3s}
.sc.active{border-color:#4f8ef7}
.sc.active2{border-color:#e24b4a}
.sc-lbl{font-size:11px;color:#888}
.sc-num{font-size:26px;font-weight:700}
.blue-t{color:#4f8ef7}.red-t{color:#e24b4a}
.turn-bar{text-align:center;font-size:14px;color:#888;margin-bottom:10px}
.turn-bar b{color:#fff}
canvas{display:block;margin:0 auto;touch-action:none;border-radius:12px;background:#111120}
.win{text-align:center;font-size:20px;font-weight:700;margin-top:12px;display:none}
.btns{display:flex;gap:8px;margin-top:12px}
.btn-s{flex:1;padding:10px;border-radius:10px;border:1px solid #333;background:#1a1a2e;color:#ccc;font-size:13px;cursor:pointer}
.btn-s:hover{background:#2a2a45}
.badge{text-align:center;font-size:11px;color:#444;margin-top:6px}
</style>
</head>
<body>
<h1>🎮 Dots & Boxes</h1>
<p class="sub">Koi account nahi — bas link share karo!</p>

<div id="lobby" style="width:100%;max-width:360px">
  <div class="card">
    <h2>👑 Room Banao (Host)</h2>
    <input id="n1" placeholder="Tumhara naam" maxlength="12"/>
    <select id="gs" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid #333;background:#0f0f1a;color:#fff;font-size:15px;margin-bottom:10px;outline:none">
      <option value="4">4×4 (Chhota)</option>
      <option value="5" selected>5×5 (Medium)</option>
      <option value="6">6×6 (Bada)</option>
    </select>
    <button class="btn blue" onclick="hostGame()">🔗 Room Banao</button>
  </div>
  <div class="or">— ya friend ne link bheja? —</div>
  <div class="card">
    <h2>🙋 Join Karo</h2>
    <input id="n2" placeholder="Tumhara naam" maxlength="12"/>
    <div class="status" id="jst"></div>
    <button class="btn red" onclick="joinGame()">▶ Join Karo</button>
  </div>
</div>

<div id="game">
  <div class="scores">
    <div class="sc" id="sc1"><div class="sc-lbl" id="lb1">P1 🔵</div><div class="sc-num blue-t" id="s1">0</div></div>
    <div class="sc" id="sc2"><div class="sc-lbl" id="lb2">P2 🔴</div><div class="sc-num red-t" id="s2">0</div></div>
  </div>
  <div class="turn-bar" id="tb">...</div>
  <canvas id="gc"></canvas>
  <div class="win" id="wm"></div>
  <div class="btns">
    <button class="btn-s" onclick="shareLink()">🔗 Link Share</button>
    <button class="btn-s" onclick="location.reload()">↺ Naya Game</button>
  </div>
  <div class="badge" id="bdg"></div>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let peer, conn;
let myRole = '';
let myName = '';
let GRID = 5;
let hL, vL, bx, scores, current, over;
let canvas, ctx, CELL, MAR;
let hostLink = '';

// ── UTILS ──
function mkGrid(g){ return Array.from({length:g},()=>Array(GRID).fill(0)); }
function mkGridV(g){ return Array.from({length:GRID},()=>Array(g).fill(0)); }
function resetState(){
  hL = Array.from({length:GRID+1},()=>Array(GRID).fill(0));
  vL = Array.from({length:GRID},()=>Array(GRID+1).fill(0));
  bx = Array.from({length:GRID},()=>Array(GRID).fill(0));
  scores={p1:0,p2:0}; current='p1'; over=false;
}

// ── HOST ──
window.hostGame = function(){
  myName = document.getElementById('n1').value.trim()||'Player 1';
  GRID = parseInt(document.getElementById('gs').value);
  myRole = 'p1';
  resetState();

  document.getElementById('lobby').innerHTML = `
    <div class="card">
      <div class="status" id="conn-st">🔄 Connecting to server...</div>
      <div id="link-area" style="display:none">
        <h2 style="margin-bottom:8px">✅ Room Ready!</h2>
        <p style="font-size:13px;color:#888;margin-bottom:8px">Yeh link dost ko WhatsApp pe bhejo:</p>
        <div class="link-box" id="lbox" onclick="shareLink()">...</div>
        <button class="btn green" onclick="shareLink()" style="margin-top:8px">📤 WhatsApp Pe Bhejo</button>
        <div class="waiting" id="wait-msg">Dost ke join karne ka wait kar rahe hain...</div>
      </div>
    </div>`;

  peer = new Peer(null, {debug:0});
  peer.on('open', id => {
    const link = location.href.split('?')[0]+'?join='+id+'&n='+encodeURIComponent(myName)+'&g='+GRID;
    hostLink = link;
    document.getElementById('conn-st').style.display='none';
    document.getElementById('link-area').style.display='block';
    document.getElementById('lbox').textContent = link;
  });
  peer.on('connection', c => {
    conn = c;
    setupConn();
    document.getElementById('wait-msg').textContent='✅ Dost connect ho gaya! Game shuru...';
    setTimeout(()=>{
      startGame(myName, c.metadata?.name||'Player 2');
      send({type:'start', p1name:myName, p2name:c.metadata?.name||'Player 2', grid:GRID,
        hL, vL, bx, scores, current});
    },800);
  });
  peer.on('error', e => {
    document.getElementById('conn-st').textContent = '❌ Error: '+e.message;
  });
};

// ── JOIN ──
window.joinGame = function(){
  const params = new URLSearchParams(location.search);
  const peerId = params.get('join');
  if(!peerId){
    document.getElementById('jst').textContent='❌ Pehle host ka link click karo!';
    return;
  }
  myName = document.getElementById('n2').value.trim()||'Player 2';
  myRole = 'p2';
  GRID = parseInt(params.get('g'))||5;

  document.getElementById('jst').textContent='🔄 Connect ho raha hoon...';
  peer = new Peer(null, {debug:0});
  peer.on('open', ()=>{
    conn = peer.connect(peerId, {metadata:{name:myName}});
    setupConn();
    document.getElementById('jst').textContent='⏳ Host ka wait...';
  });
  peer.on('error', e=>{
    document.getElementById('jst').textContent='❌ Host nahi mila. Naya link maango!';
  });
};

// ── CONNECTION ──
function setupConn(){
  conn.on('data', data => {
    if(data.type==='start'){
      GRID=data.grid;
      hL=data.hL; vL=data.vL; bx=data.bx;
      scores=data.scores; current=data.current; over=false;
      startGame(data.p1name, data.p2name);
    } else if(data.type==='move'){
      hL=data.hL; vL=data.vL; bx=data.bx;
      scores=data.scores; current=data.current;
      over=data.over;
      updateUI(data.p1name||'P1', data.p2name||'P2');
      draw();
      if(over) showWin(data.p1name||'P1', data.p2name||'P2');
    }
  });
  conn.on('close',()=>{ if(!over) alert('Dost ne connection tod diya!'); });
}

function send(data){ if(conn && conn.open) conn.send(data); }

// ── GAME UI ──
function startGame(p1,p2){
  document.getElementById('lobby').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('lb1').textContent=(p1||'P1').slice(0,8)+' 🔵';
  document.getElementById('lb2').textContent=(p2||'P2').slice(0,8)+' 🔴';
  document.getElementById('bdg').textContent='Connected ✅';
  canvas=document.getElementById('gc');
  ctx=canvas.getContext('2d');
  const vw=Math.min(window.innerWidth-40,400);
  canvas.width=vw; canvas.height=vw;
  MAR=vw*0.1; CELL=(vw-MAR*2)/GRID;
  canvas.addEventListener('click',onClick);
  canvas.addEventListener('touchstart',onTouch,{passive:false});
  updateUI(p1,p2); draw();
}

function updateUI(p1,p2){
  document.getElementById('s1').textContent=scores.p1;
  document.getElementById('s2').textContent=scores.p2;
  const c1=document.getElementById('sc1'), c2=document.getElementById('sc2');
  c1.className='sc'+(current==='p1'?' active':'');
  c2.className='sc'+(current==='p2'?' active2':'');
  const tb=document.getElementById('tb');
  if(over){ tb.textContent='Game khatam!'; return; }
  if(current===myRole) tb.innerHTML='<b>Tumhari baari! ✏️ Click karo</b>';
  else { const nm=current==='p1'?(p1||'P1'):(p2||'P2'); tb.innerHTML='<b>'+nm+'</b> ki baari...'; }
}

function gp(i){ return MAR+i*CELL; }

function draw(){
  if(!canvas||!ctx) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
    if(bx[r][c]){
      ctx.fillStyle=bx[r][c]===1?'rgba(79,142,247,.22)':'rgba(226,75,74,.22)';
      ctx.fillRect(gp(c)+2,gp(r)+2,CELL-4,CELL-4);
    }
  }
  for(let r=0;r<=GRID;r++) for(let c=0;c<GRID;c++){
    ctx.beginPath();
    ctx.strokeStyle=hL[r][c]===1?'#4f8ef7':hL[r][c]===2?'#e24b4a':'#2a2a45';
    ctx.lineWidth=hL[r][c]?4:2; ctx.lineCap='round';
    ctx.moveTo(gp(c),gp(r)); ctx.lineTo(gp(c+1),gp(r)); ctx.stroke();
  }
  for(let r=0;r<GRID;r++) for(let c=0;c<=GRID;c++){
    ctx.beginPath();
    ctx.strokeStyle=vL[r][c]===1?'#4f8ef7':vL[r][c]===2?'#e24b4a':'#2a2a45';
    ctx.lineWidth=vL[r][c]?4:2; ctx.lineCap='round';
    ctx.moveTo(gp(c),gp(r)); ctx.lineTo(gp(c),gp(r+1)); ctx.stroke();
  }
  for(let r=0;r<=GRID;r++) for(let c=0;c<=GRID;c++){
    ctx.beginPath(); ctx.arc(gp(c),gp(r),5,0,Math.PI*2);
    ctx.fillStyle='#aaa'; ctx.fill();
  }
}

function getLine(x,y){
  const t=CELL*.32;
  for(let r=0;r<=GRID;r++) for(let c=0;c<GRID;c++)
    if(Math.abs(y-gp(r))<t&&x>=gp(c)&&x<=gp(c+1)) return{type:'h',r,c};
  for(let r=0;r<GRID;r++) for(let c=0;c<=GRID;c++)
    if(Math.abs(x-gp(c))<t&&y>=gp(r)&&y<=gp(r+1)) return{type:'v',r,c};
  return null;
}

function doMove(x,y){
  if(over||current!==myRole) return;
  const line=getLine(x,y); if(!line) return;
  const val=myRole==='p1'?1:2;
  if(line.type==='h'){ if(hL[line.r][line.c]) return; hL[line.r][line.c]=val; }
  else { if(vL[line.r][line.c]) return; vL[line.r][line.c]=val; }
  let gained=0;
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++)
    if(!bx[r][c]&&hL[r][c]&&hL[r+1][c]&&vL[r][c]&&vL[r][c+1]){
      bx[r][c]=val; scores[myRole]++; gained++;
    }
  const total=scores.p1+scores.p2;
  over=total===GRID*GRID;
  if(!gained) current=myRole==='p1'?'p2':'p1';
  const p1n=document.getElementById('lb1').textContent.replace(' 🔵','');
  const p2n=document.getElementById('lb2').textContent.replace(' 🔴','');
  send({type:'move',hL,vL,bx,scores,current,over,p1name:p1n,p2name:p2n});
  updateUI(p1n,p2n); draw();
  if(over) showWin(p1n,p2n);
}

function onClick(e){ const r=canvas.getBoundingClientRect(); doMove(e.clientX-r.left,e.clientY-r.top); }
function onTouch(e){ e.preventDefault(); const r=canvas.getBoundingClientRect(); doMove(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top); }

function showWin(p1,p2){
  const wm=document.getElementById('wm'); wm.style.display='block';
  if(scores.p1>scores.p2) wm.innerHTML='🏆 '+p1+' Jeet Gaya! ('+scores.p1+' vs '+scores.p2+')';
  else if(scores.p2>scores.p1) wm.innerHTML='🏆 '+p2+' Jeet Gaya! ('+scores.p2+' vs '+scores.p1+')';
  else wm.innerHTML='🤝 Draw! Dono Barabar!';
}

window.shareLink = function(){
  const link = hostLink || location.href;
  if(navigator.share){
    navigator.share({title:'Dots & Boxes', text:'Aao mere saath Dots & Boxes khelo! 🎮', url:link});
  } else {
    navigator.clipboard.writeText(link).then(()=>alert('✅ Link copy ho gaya!\n\nWhatsApp pe paste karo:\n'+link));
  }
};

// Auto-detect join
const params = new URLSearchParams(location.search);
if(params.get('join')){
  const hostName = decodeURIComponent(params.get('n')||'Host');
  document.getElementById('lobby').innerHTML = `
    <div class="card">
      <h2>🎮 ${hostName} ne invite kiya!</h2>
      <p style="font-size:13px;color:#888;margin-bottom:12px">${hostName} ke saath Dots & Boxes khelo</p>
      <input id="n2" placeholder="Tumhara naam" maxlength="12" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid #333;background:#0f0f1a;color:#fff;font-size:15px;margin-bottom:10px;outline:none"/>
      <div class="status" id="jst"></div>
      <button class="btn green" onclick="joinGame()">▶ Join Karo!</button>
    </div>`;
}
</script>
</body>
</html>
